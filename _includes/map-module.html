<section class="map-wrapper">
  <div class="container">
    <h2>Карта маршрута</h2>
    <p class="map-instruction">Нажимайте на метки, чтобы открыть историю и архивные фото</p>
    <div class="map-layout">
      <div id="map"></div>
      <div id="point-details" class="details-panel hidden">
        <div class="details-header">
          <h3 id="point-title">Название точки</h3>
          <div class="header-buttons">
            <button class="expand-btn" onclick="expandCurrentPoint()">Развернуть</button>
            <button class="close-btn" onclick="closeDetails()">✕</button>
          </div>
        </div>
        <div class="details-body">
          <div class="image-container">
            <img id="point-img" src="" alt="Иллюстрация">
          </div>
          <div class="details-text-container">
            <div id="point-text"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="fullscreen-details" class="fullscreen-modal">
  <div class="fullscreen-modal-content">
    <div class="fullscreen-header">
      <h2 id="fullscreen-title"></h2>
      <button class="close-fullscreen-btn" onclick="closeFullscreen()">✕</button>
    </div>
    <div class="fullscreen-body">
      <div class="fullscreen-text" id="fullscreen-text"></div>
      <div class="fullscreen-gallery" id="fullscreen-gallery"></div>
    </div>
  </div>
</div>
